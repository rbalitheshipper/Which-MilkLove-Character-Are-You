<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Which MilkLove Character Are You?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-image: url(images/milklovebg.jpeg);
            background-repeat: no-repeat;
            min-height: 100vh;
            background-attachment: scroll;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(171, 245, 145, 0.5);
            width: 100%;
            max-width: 700px;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .lang-toggle {
            padding: 6px 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            background: #ffffffaa;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #ff8ee8;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        #question {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #333;
            font-weight: bold;
        }

        .option-btn {
            width: 100%;
            padding: 15px;
            margin-bottom: 12px;
            border: none;
            border-radius: 12px;
            background: #ffffff42;
            cursor: pointer;
            transition: 0.2s ease;
            font-size: 1rem;
            text-align: left;
        }

        .option-btn:hover {
            background: #fd9ccb48;
            transform: scale(1.01);
        }

        .progress {
            margin-bottom: 20px;
            color: #28781e;
            font-size: 0.95rem;
        }

        #result {
            text-align: center;
            display: none;
        }

        #result img {
            width: 250px;
            max-width: 100%;
            border-radius: 16px;
            margin: 20px 0;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.15);
        }

        .result-name {
            font-size: 2rem;
            color: #ff4f9a;
            margin-bottom: 10px;
        }

        .result-desc {
            color: #555;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .restart-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            background: #ff4f9a;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }

        .restart-btn:hover {
            opacity: 0.9;
        }
    </style>

</head>

<body>
    <div class="container">
        <div class="top-bar">
            <div></div>
            <button class="lang-toggle" onclick="toggleLanguage()" id="langBtn">TH</button>
        </div>

        <div id="quiz-container">
            <h1 id="main-title">Which MilkLove Character Are You?</h1>
            <p class="subtitle" id="subtitle">Answer 15 questions to find out!</p>

            <div class="progress" id="progress"></div>
            <div id="question"></div>
            <div id="options"></div>
        </div>

        <div id="result">
            <div class="result-name" id="result-name"></div>
            <img id="result-image" src="" alt="Character Result">
            <p id="result-description"></p>
            <button class="restart-btn" onclick="restartQuiz()" id="restart-text">Play Again</button>
        </div>

    </div>

    <script>

        // =============================
        // LANGUAGE STATE
        // =============================

        let currentLang = "en";

        function toggleLanguage() {
            currentLang = currentLang === "en" ? "th" : "en";
            document.getElementById("langBtn").innerText = currentLang === "en" ? "TH" : "EN";
            applyStaticTranslations();
            if (currentQuestion < questions.length) loadQuestion();
            if (document.getElementById("result").style.display === "block") {
                showResult();
            }
        }

        function applyStaticTranslations() {
            document.getElementById("main-title").innerText =
                currentLang === "en"
                    ? "Which MilkLove Character Are You?"
                    : "คุณเป็นตัวละคร มิ้ลค์เลิฟ คนไหน?";

            document.getElementById("subtitle").innerText =
                currentLang === "en"
                    ? "Answer these questions to find out!"
                    : "ตอบคำถามเหล่านี้เพื่อหาคำตอบ!";

            document.getElementById("restart-text").innerText =
                currentLang === "en" ? "Play Again" : "เล่นอีกครั้ง";
        }

        // =============================
        // CHARACTER RESULTS
        // =============================

        const characters = {
            oongsa: {
                name: { en: "Oongsa", th: "อองศา" },
                image: "images/oongsa.png",
                description: {
                    en: "Friendly lovable nerdy neighborhood dork. People love you even if you don't see the reason why they do. You care for people, you 'try' to help however you can. You are amazing just the way you are!",
                    th: "คุณเป็นคนน่ารัก นิสัยดี เป็นคนเนิร์ดๆ อยู่ในละแวกบ้าน คนอื่นๆ รักคุณแม้ว่าคุณจะไม่เข้าใจว่าทำไมพวกเขาถึงรักคุณ คุณใส่ใจคนอื่น คุณพยายามช่วยเหลือเท่าที่คุณทำได้ คุณยอดเยี่ยมในแบบที่คุณเป็นอยู่แล้ว!"
                }
            },
            sun: {
                name: { en: "Sun", th: "ซัน" },
                image: "images/sun.png",
                description: {
                    en: "You are the light people turn to in dark times. Underneat that sweet and cute persona is a strong willed independent person who just wants to make the world a better place. The love you easily give to everyone finds its way back to you just as easily.",
                    th: "คุณคือแสงสว่างที่ผู้คนหันมาหาในยามมืดมน ภายใต้บุคลิกที่อ่อนหวานและน่ารักนั้นซ่อนไว้ซึ่งความเป็นคนเข้มแข็งและเป็นอิสระ ที่เพียงต้องการทำให้โลกนี้น่าอยู่ขึ้น ความรักที่คุณมอบให้ทุกคนอย่างง่ายดาย จะกลับมาหาคุณอย่างง่ายดายเช่นกัน"
                }
            },
            ink: {
                name: { en: "Ink", th: "อิงค์" },
                image: "images/ink.png",
                description: {
                    en: "You are charming, caring and always willing to step in when people need you. You are trustworthy and reliable. You like being needed and spoil people with love.",
                    th: "คุณมีเสน่ห์ เอาใจใส่ และพร้อมที่จะช่วยเหลือผู้อื่นเสมอเมื่อพวกเขาต้องการ คุณเป็นคนน่าเชื่อถือและพึ่งพาได้ คุณชอบที่จะเป็นที่ต้องการและมอบความรักให้ผู้อื่น"
                }
            },
            pa: {
                name: { en: "Pa", th: "ป๋า" },
                image: "images/pa.png",
                description: {
                    en: "You possess a charming and endearing quality that makes people want to cherish you forever. You might be clumsy or awkward at times, but all of that only enhances your childlike personality. You have fought through the harsh realities of the world, yet you still retain the childlike spirit within you.",
                    th: "คุณมีเสน่ห์น่ารักที่ทำให้คนอยากทะนุถนอมคุณไปตลอดกาล คุณอาจจะซุ่มซ่ามหรือทำตัวงุ่มง่ามบ้างในบางครั้ง แต่ทั้งหมดนั้นก็ยิ่งเสริมบุคลิกความเป็นเด็กของคุณ คุณต่อสู้ฝ่าฟันความโหดร้ายของโลกมาได้ แต่ก็ยังคงรักษาจิตวิญญาณความเป็นเด็กในตัวคุณไว้ได้"
                }
            },
            wan: {
                name: { en: "Wan", th: "ว่าน" },
                image: "images/wan.png",
                description: {
                    en: "You have been through a lot in life and know your worth now. You are ready to dedicate yourself to achieving all your goals. Your career is very important to you, but deep down, you just want to live life with your loved ones in peace. Your friends see you as a strong one.",
                    th: "คุณผ่านเรื่องราวมากมายในชีวิตและรู้คุณค่าของตัวเองแล้ว คุณพร้อมที่จะทุ่มเทเพื่อบรรลุเป้าหมายทั้งหมดของคุณ อาชีพการงานสำคัญมากสำหรับคุณ แต่ลึกๆ แล้ว คุณแค่อยากใช้ชีวิตอย่างสงบสุขกับคนที่คุณรัก เพื่อนๆ มองว่าคุณเป็นคนเข้มแข็ง"
                }
            },
            meawnam: {
                name: { en: "Meawnam", th: "แมวน้ำ" },
                image: "images/meawnam.png",
                description: {
                    en: "Is there anything you can't do? You are smart, independent, pretty and adorable. You sieze the day with your hard work, determination and effortless charisma. Animals love you, babies love you and honestly maybe I would too if I knew you!",
                    th: "มีอะไรที่คุณทำไม่ได้บ้าง? คุณฉลาด เป็นอิสระ สวย และน่ารัก คุณใช้ชีวิตอย่างเต็มที่ด้วยความขยัน ความมุ่งมั่น และเสน่ห์ที่ดึงดูดใจ สัตว์ต่างๆ รักคุณ เด็กๆ รักคุณ และเอาจริงๆ แล้ว ฉันเองก็คงรักคุณเหมือนกันถ้าฉันได้รู้จักคุณ!"
                }
            },
            shasha: {
                name: { en: "Shasha", th: "ชาช่า" },
                image: "images/shasha.png",
                description: {
                    en: "People don't really understand you and sometimes you don't really understand people either. You have suffered through unimaginable pain, so much so, most people can't even comprehend what you went through. Yet, you are here, you are trying and you keep fighting for the good in you. Somedays you might falter but you are a forever fighter!",
                    th: "ผู้คนมักไม่เข้าใจคุณ และบางครั้งคุณเองก็ไม่เข้าใจคนอื่นเช่นกัน คุณต้องทนทุกข์ทรมานจากความเจ็บปวดที่ยากจะจินตนาการ จนกระทั่งคนส่วนใหญ่ไม่สามารถเข้าใจได้ว่าคุณผ่านอะไรมาบ้าง แต่คุณก็ยังอยู่ที่นี่ คุณพยายามต่อไป และคุณยังคงต่อสู้เพื่อสิ่งดีงามในตัวคุณ บางวันคุณอาจท้อแท้ แต่คุณคือนักสู้ตลอดกาล!"
                }
            },
            gorya: {
                name: { en: "Gorya", th: "กอหญ้า" },
                image: "images/gorya.png",
                description: {
                    en: "You value honesty and sincerity more than fake smiles. You have a goal and you don't like wasting your chances. People come to you not because you are overly friendly but because they value your realness. You might be a little Tsundere but you definitely go above and beyond once you are in love!",
                    th: "คุณให้คุณค่ากับความซื่อสัตย์และความจริงใจมากกว่ารอยยิ้มเสแสร้ง คุณมีเป้าหมายและไม่ชอบเสียโอกาส คนเข้าหาคุณไม่ใช่เพราะคุณเป็นมิตรมากเกินไป แต่เพราะพวกเขาชื่นชมความเป็นตัวตนที่แท้จริงของคุณ คุณอาจจะออกแนวซึนเดเระนิดหน่อย แต่คุณจะทุ่มเทอย่างเต็มที่เมื่อคุณตกหลุมรัก!"
                }
            },
            dear: {
                name: { en: "Dear", th: "เดียร์" },
                image: "images/dear.png",
                description: {
                    en: "No matter how many times life has thrown you a curve ball, you came back stronger, stealthier and better. You are observant and you don't shy away from showing you care. Some might even say you are too kind but you just have seen enough darkness to know better than to judge.",
                    th: "ไม่ว่าชีวิตจะโยนอุปสรรคมาให้คุณกี่ครั้ง คุณก็กลับมาแข็งแกร่งขึ้น ว่องไวขึ้น และดีขึ้นกว่าเดิมเสมอ คุณเป็นคนช่างสังเกตและไม่ลังเลที่จะแสดงความห่วงใย บางคนอาจบอกว่าคุณใจดีเกินไป แต่คุณก็เคยเจอเรื่องร้ายๆ มามากพอที่จะรู้ว่าไม่ควรตัดสินคนอื่น"
                }
            },
            rafah: {
                name: { en: "Rafah", th: "ราฟาห์" },
                image: "images/gorya.png",
                description: {
                    en: "You don't like doing things half way to say the least. Nothing beats your passion, whatever it is your passionate about, you will go all in. While some people chase fulfillment, you chase your passion. And honestly, nothing is more fulfilling than chasing your passion!",
                    th: "คุณไม่ชอบทำอะไรครึ่งๆ กลางๆ อย่างน้อยที่สุด คุณไม่มีอะไรจะเทียบได้กับความหลงใหลของคุณ ไม่ว่าคุณจะหลงใหลอะไร คุณก็จะทุ่มเทอย่างเต็มที่ ในขณะที่บางคนไล่ตามความพึงพอใจ คุณกลับไล่ตามความหลงใหลของคุณ และพูดตามตรง ไม่มีอะไรจะเติมเต็มความสุขได้มากไปกว่าการไล่ตามความหลงใหลของคุณ!"
                }
            },

        };

        // =============================
        // QUESTIONS (BILINGUAL STRUCTURE)
        // =============================

        const questions = [
            {
                question: {
                    en: "Your friend has been uncharacteristically quiet today. What do you do?",
                    th: "วันนี้เพื่อนของคุณเงียบผิดปกติ คุณจะทำอย่างไร?"
                },
                options: [
                    { text: { en: "Wait for them to eventually share their thoughts", th: "รอจนกว่าพวกเขาจะได้แบ่งปันความคิดของตนเองในที่สุด" }, points: "shasha" },
                    {
                        text: {
                            en: "Buy them their favorite snack hoping it helps cheer them up a little", th: "ซื้อขนมที่พวกเขาชอบให้ หวังว่ามันจะช่วยให้พวกเขารู้สึกดีขึ้นบ้าง"
                        }, points: "wan"
                    },
                    {
                        text: {
                            en: "Point out they have been very silent", th: "ชี้ให้เห็นว่าพวกเขาเงียบมาก"
                        }, points: "gorya"
                    },
                    { text: { en: "Give them company and try to keep the conversations light and humorous", th: "อยู่เป็นเพื่อนพวกเขาและพยายามทำให้บทสนทนาสนุกสนานและมีอารมณ์ขัน" }, points: "meawnam" }
                ]
            },
            {
                question: {
                    en: "You are running late to class, why are you late?",
                    th: "คุณมาเรียนสาย ทำไมคุณถึงมาสาย?"
                },
                options: [
                    { text: { en: "I don't know honestly, never been late before.", th: "ฉันไม่รู้จริงๆ ฉันไม่เคยมาสายมาก่อนเลย" }, points: "meawnam" },
                    {
                        text: {
                            en: "I set the wrong alarm time.", th: "ฉันตั้งเวลาปลุกผิด"
                        }, points: "wan"
                    },
                    {
                        text: {
                            en: "One of the juniors needed some help so it took a few minutes", th: "นักเรียนรุ่นน้องคนหนึ่งต้องการความช่วยเหลือ จึงใช้เวลาสักครู่"
                        }, points: "ink"
                    },
                    {
                        text: {
                            en: "I forgot my lenses/glasses and tripped twice!!", th: "ฉันลืมแว่นตาและหลงทางถึงสองครั้ง!!"
                        }, points: "pa"
                    }
                ]
            },
            {
                question: {
                    en: "You like someone in your school/company but you are not fully sure if they like you back too. So what do you do?",
                    th: "คุณชอบใครสักคนในโรงเรียน/ที่ทำงาน แต่ไม่แน่ใจว่าเขา/เธอจะชอบคุณกลับหรือเปล่า แล้วคุณจะทำอย่างไร?"
                },
                options: [
                    {
                        text: {
                            en: "Just ask them out, no harm in trying.", th: "ลองชวนพวกเขาออกเดทดูสิ ไม่มีอะไรเสียหายหรอก"
                        }, points: "shasha"
                    },
                    {
                        text: {
                            en: "Try to spend time/ flirt with them and see how they react", th: "ลองใช้เวลาอยู่กับพวกเขาหรือลองหยอกล้อดู แล้วสังเกตปฏิกิริยาของพวกเขา"
                        }, points: "ink"
                    },
                    {
                        text: {
                            en: "Make my presence known and wait for them to notice.", th: "แสดงให้พวกเขารู้ว่าฉันอยู่ตรงนี้ และรอให้พวกเขาสังเกตเห็น"
                        }, points: "gorya"
                    },
                    {
                        text: {
                            en: "I'll be watching for confirmation signals, but I probably don't want to ask directly.", th: "ฉันจะคอยสังเกตสัญญาณยืนยัน แต่คงไม่อยากถามโดยตรง"
                        }, points: "pa"
                    }
                ]
            },
            {
                question: {
                    en: "You had a tiring day at work, what are you doing for dinner?",
                    th: "วันนี้คุณทำงานเหนื่อยมาทั้งวันแล้ว คุณจะทานอะไรเป็นอาหารเย็น?"
                },
                options: [
                    {
                        text: {
                            en: "Skip dinner, go to sleep.", th: "ไม่ต้องกินข้าวเย็น เข้านอนเลย"
                        }, points: "pa"
                    },
                    {
                        text: {
                            en: "I will just grab some take out on my way", th: "ฉันจะซื้ออาหารกลับบ้าน"
                        }, points: "meawnam"
                    },
                    {
                        text: {
                            en: "Instant ramen it is!", th: "เอาเป็นบะหมี่กึ่งสำเร็จรูปแล้วกัน!"
                        }, points: "wan"
                    },
                    {
                        text: {
                            en: "Just heat up whatever's leftover from lunch", th: "แค่อุ่นอาหารที่เหลือจากมื้อเที่ยงก็พอแล้ว"
                        }, points: "ink"
                    }
                ]
            }

        ];

        // =============================
        // QUIZ LOGIC
        // =============================

        let currentQuestion = 0;

        const scores = {};
        Object.keys(characters).forEach(key => scores[key] = 0);

        const questionElement = document.getElementById("question");
        const optionsElement = document.getElementById("options");
        const progressElement = document.getElementById("progress");

        function loadQuestion() {
            const current = questions[currentQuestion];

            progressElement.innerText =
                currentLang === "en"
                    ? `Question ${currentQuestion + 1} of ${questions.length}`
                    : `คำถาม ${currentQuestion + 1} จาก ${questions.length}`;

            questionElement.innerText = current.question[currentLang];

            optionsElement.innerHTML = "";

            current.options.forEach(option => {
                const button = document.createElement("button");
                button.classList.add("option-btn");
                button.innerText = option.text[currentLang];

                button.addEventListener("click", () => {
                    scores[option.points]++;
                    currentQuestion++;
                    if (currentQuestion < questions.length) {
                        loadQuestion();
                    } else {
                        showResult();
                    }
                });

                optionsElement.appendChild(button);
            });
        }

        function showResult() {
            document.getElementById("quiz-container").style.display = "none";
            document.getElementById("result").style.display = "block";

            let winner = Object.keys(scores)[0];
            Object.keys(scores).forEach(character => {
                if (scores[character] > scores[winner]) {
                    winner = character;
                }
            });

            const result = characters[winner];

            document.getElementById("result-name").innerText = result.name[currentLang];
            document.getElementById("result-image").src = result.image;
            document.getElementById("result-description").innerText = result.description[currentLang];
        }

        function restartQuiz() {
            currentQuestion = 0;
            Object.keys(scores).forEach(key => scores[key] = 0);
            document.getElementById("quiz-container").style.display = "block";
            document.getElementById("result").style.display = "none";
            loadQuestion();
        }

        applyStaticTranslations();
        loadQuestion();

    </script>

</body>
