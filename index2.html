<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Which Character Are You?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-image: url(images/milklovebg.jpeg);
            background-repeat: no-repeat;
            min-height: 100vh;
            background-attachment: scroll;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(171, 245, 145, 0.5);
            width: 100%;
            max-width: 700px;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .lang-toggle {
            padding: 6px 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            background: #ffffffaa;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #1b9812;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        #question {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #333;
            font-weight: bold;
        }

        .option-btn {
            width: 100%;
            padding: 15px;
            margin-bottom: 12px;
            border: none;
            border-radius: 12px;
            background: #ffffff42;
            cursor: pointer;
            transition: 0.2s ease;
            font-size: 1rem;
            text-align: left;
        }

        .option-btn:hover {
            background: #fd9ccb48;
            transform: scale(1.01);
        }

        .progress {
            margin-bottom: 20px;
            color: #28781e;
            font-size: 0.95rem;
        }

        #result {
            text-align: center;
            display: none;
        }

        #result img {
            width: 250px;
            max-width: 100%;
            border-radius: 16px;
            margin: 20px 0;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.15);
        }

        .result-name {
            font-size: 2rem;
            color: #ff4f9a;
            margin-bottom: 10px;
        }

        .result-desc {
            color: #555;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .restart-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            background: #ff4f9a;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }

        .restart-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="top-bar">
            <div></div>
            <button class="lang-toggle" onclick="toggleLanguage()" id="langBtn">EN</button>
        </div>
        <div id="quiz-container">
            <h1>
                <font style="color: rgb(51, 124, 34); ">Which</font> Milk<font style="color: rgb(233, 114, 180); ">Love
                </font>
                <font style="color: rgb(51, 124, 34); "> Character Are You?
                </font>
            </h1>
            <p class="subtitle">Answer 15 questions to find out!</p>

            <div class="progress" id="progress"></div>

            <div id="question"></div>

            <div id="options"></div>
        </div>

        <div id="result">
            <div class="result-name" id="result-name"></div>

            <img id="result-image" src="" alt="Character Result">

            <p class="result-desc" id="result-description"></p>

            <button class="restart-btn" onclick="restartQuiz()">
                Play Again
            </button>
        </div>

    </div>
    <script>

        // =============================
        // LANGUAGE STATE
        // =============================

        let currentLang = "en";

        function toggleLanguage() {
            currentLang = currentLang === "en" ? "th" : "en";
            document.getElementById("langBtn").innerText = currentLang === "en" ? "TH" : "EN";
            applyStaticTranslations();
            if (currentQuestion < questions.length) loadQuestion();
            if (document.getElementById("result").style.display === "block") {
                showResult();
            }
        }

        function applyStaticTranslations() {
            document.getElementById("main-title").innerText =
                currentLang === "en"
                    ? "Which MilkLove Character Are You?"
                    : "คุณเป็นตัวละคร MilkLove คนไหน?";

            document.getElementById("subtitle").innerText =
                currentLang === "en"
                    ? "Answer 15 questions to find out!"
                    : "ตอบคำถาม 15 ข้อเพื่อค้นหาคำตอบ!";

            document.getElementById("restart-text").innerText =
                currentLang === "en" ? "Play Again" : "เล่นอีกครั้ง";
        }
        // ==========================================
        // CHARACTER RESULTS
        // ==========================================
        // Replace names, descriptions and image names.
        // Put your images inside the /images folder.
        // Example: images/kay.jpg

        const characters = {
            oongsa: {
                name: "Oongsa",
                image: "images\oongsa.png",
                description: "Friendly lovable nerdy neighborhood dork. People love you even if you don't see the reason why they do. You care for people, you 'try' to help however you can. You are amazing just the way you are! "
            },

            sun: {
                name: "Sun",
                image: "images/sun.png",
                description: "You are the light people turn to in dark times. Underneat that sweet and cute persona is a strong willed independent person who just wants to make the world a better place. The love you easily give to everyone finds its way back to you just as easily."
            },

            ink: {
                name: "Ink",
                image: "images/ink.png",
                description: "You are charming, caring and always willing to step in when people need you. You are trustworthy and reliable. You like being needed and spoil people with love and occassionally unsolicited advice. "
            },

            pa: {
                name: "Pa",
                image: "images/pa.png",
                description: "You are ambitious, confident and always chase your goals aggressively."
            },
            wan: {
                name: "Wan",
                image: "images/wan.png",
                description: "You are charming, caring and always willing to support your friends."
            },

            meawnam: {
                name: "Meawnam",
                image: "images/meawnam.png",
                description: "You are ambitious, confident and always chase your goals aggressively."
            },
            shasha: {
                name: "Shasha",
                image: "images/shasha.png",
                description: "You are charming, caring and always willing to support your friends."
            },

            gorya: {
                name: "Gorya",
                image: "images/gorya.png",
                description: "You are ambitious, confident and always chase your goals aggressively."
            },
            dear: {
                name: "Dear",
                image: "images/dear.png",
                description: "You are charming, caring and always willing to support your friends."
            },

            rafah: {
                name: "Rafah",
                image: "images/rafah.png",
                description: "You are ambitious, confident and always chase your goals aggressively."
            }
        };


        // ==========================================
        // QUESTIONS
        // Each option adds points to a character.
        // ==========================================

        const questions = [
            {
                question: "What is your biggest strength?",
                options: [
                    { text: "Leadership", points: "kay" },
                    { text: "Empathy", points: "lisa" },
                    { text: "Charm", points: "cecilia" },
                    { text: "Ambition", points: "caelum" }
                ]
            },

            {
                question: "How do you handle conflict?",
                options: [
                    { text: "Face it directly", points: "kay" },
                    { text: "Try to understand emotions", points: "lisa" },
                    { text: "Negotiate peacefully", points: "cecilia" },
                    { text: "Use strategy to win", points: "caelum" }
                ]
            },

            {
                question: "Which quality matters most in friendship?",
                options: [
                    { text: "Trust", points: "kay" },
                    { text: "Emotional support", points: "lisa" },
                    { text: "Kindness", points: "cecilia" },
                    { text: "Loyalty to your side", points: "caelum" }
                ]
            },

            {
                question: "What would your friends describe you as?",
                options: [
                    { text: "Reliable", points: "kay" },
                    { text: "Sensitive", points: "lisa" },
                    { text: "Friendly", points: "cecilia" },
                    { text: "Competitive", points: "caelum" }
                ]
            },

            {
                question: "Pick a dream activity.",
                options: [
                    { text: "Training for battle", points: "kay" },
                    { text: "Writing in a journal", points: "lisa" },
                    { text: "Hosting a royal event", points: "cecilia" },
                    { text: "Building influence", points: "caelum" }
                ]
            },

            {
                question: "How do you make decisions?",
                options: [
                    { text: "Logic first", points: "kay" },
                    { text: "Heart first", points: "lisa" },
                    { text: "Balance both", points: "cecilia" },
                    { text: "Whatever benefits me", points: "caelum" }
                ]
            },

            {
                question: "What motivates you most?",
                options: [
                    { text: "Duty", points: "kay" },
                    { text: "Love", points: "lisa" },
                    { text: "Helping others", points: "cecilia" },
                    { text: "Power", points: "caelum" }
                ]
            },

            {
                question: "Choose a color.",
                options: [
                    { text: "Blue", points: "kay" },
                    { text: "Pink", points: "lisa" },
                    { text: "Gold", points: "cecilia" },
                    { text: "Black", points: "caelum" }
                ]
            },

            {
                question: "How do you react under pressure?",
                options: [
                    { text: "Stay calm", points: "kay" },
                    { text: "Get emotional", points: "lisa" },
                    { text: "Support everyone", points: "cecilia" },
                    { text: "Take control", points: "caelum" }
                ]
            },

            {
                question: "Which role would you take in a team?",
                options: [
                    { text: "Leader", points: "kay" },
                    { text: "Emotional anchor", points: "lisa" },
                    { text: "Mediator", points: "cecilia" },
                    { text: "Strategist", points: "caelum" }
                ]
            },

            {
                question: "What scares you most?",
                options: [
                    { text: "Failing your people", points: "kay" },
                    { text: "Losing loved ones", points: "lisa" },
                    { text: "Being alone", points: "cecilia" },
                    { text: "Losing control", points: "caelum" }
                ]
            },

            {
                question: "What kind of environment do you enjoy?",
                options: [
                    { text: "Structured", points: "kay" },
                    { text: "Comforting", points: "lisa" },
                    { text: "Elegant", points: "cecilia" },
                    { text: "Competitive", points: "caelum" }
                ]
            },

            {
                question: "Choose a quote.",
                options: [
                    { text: "Protect what matters.", points: "kay" },
                    { text: "Love changes everything.", points: "lisa" },
                    { text: "Kindness is strength.", points: "cecilia" },
                    { text: "Victory belongs to the bold.", points: "caelum" }
                ]
            },

            {
                question: "What is your ideal weekend?",
                options: [
                    { text: "Learning new skills", points: "kay" },
                    { text: "Spending time with loved ones", points: "lisa" },
                    { text: "Going out with friends", points: "cecilia" },
                    { text: "Planning future success", points: "caelum" }
                ]
            },

            {
                question: "How would you want people to remember you?",
                options: [
                    { text: "Strong", points: "kay" },
                    { text: "Loving", points: "lisa" },
                    { text: "Warm-hearted", points: "cecilia" },
                    { text: "Powerful", points: "caelum" }
                ]
            }
        ];


        // ==========================================
        // QUIZ LOGIC
        // ==========================================

        let currentQuestion = 0;

        const scores = {
            kay: 0,
            lisa: 0,
            cecilia: 0,
            caelum: 0
        };


        const questionElement = document.getElementById("question");
        const optionsElement = document.getElementById("options");
        const progressElement = document.getElementById("progress");


        function loadQuestion() {
            const current = questions[currentQuestion];

            progressElement.innerText = `Question ${currentQuestion + 1} of ${questions.length}`;

            questionElement.innerText = current.question;

            optionsElement.innerHTML = "";

            current.options.forEach(option => {
                const button = document.createElement("button");

                button.classList.add("option-btn");
                button.innerText = option.text;

                button.addEventListener("click", () => {
                    scores[option.points]++;
                    currentQuestion++;

                    if (currentQuestion < questions.length) {
                        loadQuestion();
                    } else {
                        showResult();
                    }
                });

                optionsElement.appendChild(button);
            });
        }


        function showResult() {
            document.getElementById("quiz-container").style.display = "none";
            document.getElementById("result").style.display = "block";

            let winner = Object.keys(scores)[0];

            Object.keys(scores).forEach(character => {
                if (scores[character] > scores[winner]) {
                    winner = character;
                }
            });

            const result = characters[winner];

            document.getElementById("result-name").innerText = result.name;
            document.getElementById("result-image").src = result.image;
            document.getElementById("result-description").innerText = result.description;
        }


        function restartQuiz() {
            currentQuestion = 0;

            Object.keys(scores).forEach(character => {
                scores[character] = 0;
            });

            document.getElementById("quiz-container").style.display = "block";
            document.getElementById("result").style.display = "none";

            loadQuestion();
        }


        loadQuestion();

    </script>
</body>

</html>
